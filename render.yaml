services:
  - type: web
    name: prometheus-api
    env: node
    plan: free
    nodeVersion: 20.0.0
    buildCommand: npm install && cd server && npm install && pip3 install -r requirements.txt
    startCommand: node --max-old-space-size=350 --expose-gc server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PYTHON_PATH
        value: python3
      - key: DB_TYPE
        value: sqlite
      - key: BROKER_MODE
        value: SIMULATION
      - key: VITE_API_URL
        value: https://prometheus-api-zbgy.onrender.com # Self-reference or update as needed
    healthCheckPath: /health
    autoDeploy: true
